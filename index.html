<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>Initiative Tracker</title>

<style>
body {
    font-family: Arial;
    margin: 20px;
}

.row {
    display: flex;
    gap: 10px;
    margin-bottom: 6px;
    align-items: center;
}

input {
    padding: 5px;
}

.error {
    color: red;
    font-size: 12px;
    margin-left: 5px;
}

.highlight {
    border: 2px solid green;
    padding: 4px;
}

button {
    padding: 5px 10px;
    cursor: pointer;
}

/* Tooltip */
.tooltip {
    position: absolute;
    background: lightyellow;
    border: 1px solid black;
    padding: 5px;
    font-size: 12px;
    display: none;
}
</style>
</head>

<body>

<h2>Akteure hinzufügen</h2>

<div id="actorContainer"></div>

<button onclick="addRow()">Akteur hinzufügen</button>
<button onclick="saveActors()">Weiter</button>

<hr>

<h2>Reihenfolge</h2>
<div id="tracker"></div>

<script>
let actors = [];
let rows = [];
let timers = {};

// -----------------------
// ROW ERSTELLEN
// -----------------------
function addRow() {
    const container = document.getElementById("actorContainer");

    const row = document.createElement("div");
    row.className = "row";

    row.innerHTML = `
        <input placeholder="Name">
        <input placeholder="Initiative">
        <input placeholder="Wert 1-6">
        <span class="error initErr"></span>
        <span class="error valErr"></span>
    `;

    const inputs = row.querySelectorAll("input");
    const name = inputs[0];
    const init = inputs[1];
    const value = inputs[2];

    const initErr = row.querySelector(".initErr");
    const valErr = row.querySelector(".valErr");

    function scheduleValidation() {
        const key = row;

        clearTimeout(timers[key]);

        timers[key] = setTimeout(() => {
            validateRow(name, init, value, initErr, valErr);
        }, 1200);
    }

    init.addEventListener("input", scheduleValidation);
    value.addEventListener("input", scheduleValidation);

    container.appendChild(row);
    rows.push({row, name, init, value});
}

// -----------------------
// VALIDATION
// -----------------------
function validateRow(name, init, value, initErr, valErr) {
    let ok = true;

    let i = parseInt(init.value);
    if (isNaN(i) || i < 8) {
        init.style.border = "2px solid red";
        initErr.textContent = "≥ 8 erforderlich";
        ok = false;
    } else {
        init.style.border = "";
        initErr.textContent = "";
    }

    let v = parseInt(value.value);
    if (isNaN(v) || v < 1 || v > 6) {
        value.style.border = "2px solid red";
        valErr.textContent = "1–6 erlaubt";
        ok = false;
    } else {
        value.style.border = "";
        valErr.textContent = "";
    }

    return ok;
}

// -----------------------
// SPEICHERN + INIT
// -----------------------
function saveActors() {
    actors = [];

    rows.forEach(r => {
        let i = parseInt(r.init.value);
        let v = parseInt(r.value.value);

        if (!isNaN(i) && !isNaN(v)) {
            actors.push({
                name: r.name.value,
                value: 25 - (i + v)
            });
        }
    });

    render();
}

// -----------------------
// RENDER TRACKER
// -----------------------
function render() {
    const tracker = document.getElementById("tracker");
    tracker.innerHTML = "";

    actors.sort((a,b) => a.value - b.value);

    actors.forEach((a, index) => {

        const div = document.createElement("div");
        div.className = "row";

        if (index === 0) {
            div.classList.add("highlight");
        }

        div.innerHTML = `
            <div style="width:150px">${a.name}</div>
            <button onclick="applyCost(${index},1)" title="Hinschmeißen">1 AkP</button>
            <button onclick="applyCost(${index},3)" title="Gehen / Waffen wechseln / Aufstehen">3 AkP</button>
            <button onclick="applyCost(${index},6)" title="Laufen / Gegenstand aus dem Rucksack nehmen">6 AkP</button>
            <button onclick="applyCost(${index},9)" title="Sprinten / Schwerer Angriff">9 AkP</button>
        `;

        tracker.appendChild(div);
    });
}

// -----------------------
// AKP LOGIK
// -----------------------
function applyCost(index, cost) {
    actors[index].value += cost;
    render();
}

// Start
addRow();
</script>

</body>
</html>
